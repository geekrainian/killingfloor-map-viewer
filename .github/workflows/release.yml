name: release

# Push a tag like v0.1.0 to build every OS, then publish all installers to a
# single GitHub release (created as a draft; review the assets, then publish it).
#
# Each OS builds in parallel and only uploads its installers as workflow
# artifacts. A single final job collects them and creates the release — running
# electron-builder's own publish from three concurrent matrix jobs races on the
# draft and drops most assets, so publishing happens exactly once here.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build installers
        run: pnpm exec electron-builder --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: error

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            2>/dev/null || echo "release $GITHUB_REF_NAME exists — updating its assets"
          gh release upload "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
