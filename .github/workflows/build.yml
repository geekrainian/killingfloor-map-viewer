name: build

# Smoke-test packaging on every OS for pushes and PRs, without publishing.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pack:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Package (no publish)
        run: pnpm run pack
